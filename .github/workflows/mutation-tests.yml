name: Tier 2 Mutation Tests

on:
  pull_request:
    branches:
      - main

jobs:
  mutation:
    name: Delta Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install go-mutesting
        run: go install github.com/zimmski/go-mutesting/cmd/go-mutesting@latest

      - name: Run Delta Mutation Tests
        run: |
          set -e
          echo "Finding modified Go files..."
          
          # Use github.base_ref to accurately diff against the target branch of the PR
          MODIFIED_FILES=$(git diff origin/${{ github.base_ref }}...HEAD --name-only | grep '\.go$' || true)
          
          if [ -z "$MODIFIED_FILES" ]; then
            echo "No .go files modified. Skipping mutation testing."
            exit 0
          fi
          
          # Filter out deleted files as they cannot be mutated
          FILES_TO_TEST=""
          for file in $MODIFIED_FILES; do
            if [ -f "$file" ]; then
              FILES_TO_TEST="$FILES_TO_TEST $file"
            fi
          done
          
          if [ -z "$FILES_TO_TEST" ]; then
            echo "No existing .go files to test. Skipping."
            exit 0
          fi
          
          echo "Running go-mutesting on:"
          for file in $FILES_TO_TEST; do
            echo "  - $file"
          done
          
          go-mutesting $FILES_TO_TEST
