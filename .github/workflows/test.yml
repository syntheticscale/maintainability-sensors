name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install External Analysis Tools
        run: |
          # Install PyLint for Python golden snapshots
          python -m pip install --upgrade pip
          pip install pylint
          pip install ruff
          # Install ESLint for TypeScript golden snapshots
          npm install -g eslint

      - name: Cache Cloned Target Repositories
        id: cache-repos
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-validation-repos-v1
          restore-keys: |
            ${{ runner.os }}-validation-repos-

      - name: Run Tests
        run: go test ./...
